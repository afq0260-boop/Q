}

        /* تنسيق الفقرات داخل الشرح */

let questions = [];
let currentIndex = 0;
let selected = null;
let score = 0;

function initTest() {
    const savedQ = JSON.parse(localStorage.getItem("temporary_q"));

    if (savedQ) {
        questions = [savedQ];
        localStorage.removeItem("temporary_q");
    } else {
        // خلط كامل للأسئلة
        const shuffled = [...allQuestions].sort(() => Math.random() - 0.5);

        // أخذ 10 أسئلة فقط
        questions = shuffled.slice(0, 10);
    }

    currentIndex = 0;
    score = 0;
    selected = null;

    load();
}

function load() {
    if (currentIndex >= questions.length) {
        showFinalReport();
        return;
    }

    const qData = questions[currentIndex];

    document.getElementById('q-text').innerText = qData.q;
    document.getElementById('counter-text').innerText =
        `سؤال ${currentIndex + 1} / ${questions.length}`;

    document.getElementById('category-tag').innerText =
        `القسم الكمي (${qData.type})`;

    let prog = (currentIndex / questions.length) * 100;

    document.getElementById('progress-fill').style.width = prog + "%";
    document.getElementById('progress-text').innerText =
        Math.round(prog) + "%";

    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';

    qData.options.forEach(opt => {
        const btn = document.createElement('div');

        btn.className =
            `option-card p-5 font-bold flex justify-between items-center ${
                selected === opt ? 'selected' : ''
            }`;

        btn.innerHTML = `
            <span>${opt}</span>
            <i class="fas ${
                selected === opt
                    ? 'fa-check-circle'
                    : 'fa-circle-notch opacity-20'
            }"></i>
        `;

        btn.onclick = () => {
            selected = opt;
            load();
        };

        grid.appendChild(btn);
    });
}

function checkAnswer() {
    if (!selected) {
        showAlert('⚠️', 'تنبيه', 'الرجاء اختيار إجابة أولاً!', 'حسناً');
        return;
    }

    if (selected === questions[currentIndex].answer) {
        score++;
    }

    currentIndex++;
    selected = null;
    load();
}

function showAlert(icon, title, msgHTML, btnText = 'حسناً') {
    document.getElementById('alert-icon').innerText = icon;
    document.getElementById('alert-title').innerText = title;
    document.getElementById('alert-msg').innerHTML = msgHTML;
    document.getElementById('alert-main-btn').innerText = btnText;
    document.getElementById('alert-overlay').classList.remove('hidden');
}

function closeAlert() {
    document.getElementById('alert-overlay').classList.add('hidden');
}

function showFinalReport() {
    const percentage = Math.round((score / questions.length) * 100);

    showAlert(
        '🎯',
        'انتهى التدريب!',
        `درجتك هي: ${percentage}%<br>أجبت على ${score} من أصل ${questions.length}`,
        'إعادة المحاولة'
    );

    document.getElementById('alert-main-btn').onclick = () => {
        initTest();
        closeAlert();
    };

    document.getElementById('alert-exit-btn').classList.remove('hidden');
}

async function aiAction(mode) {
    const qData = questions[currentIndex];

    if (mode === "save") {
        let saved = JSON.parse(localStorage.getItem("ufuq_saved")) || [];

        saved.push({
            id: Date.now(),
            q: qData.q,
            options: qData.options,
            answer: qData.answer,
            type: qData.type,
            date: new Date().toLocaleDateString()
        });

        localStorage.setItem("ufuq_saved", JSON.stringify(saved));

        showAlert('📌', 'تم الحفظ', 'تم حفظ السؤال بنجاح', 'حسناً');
        return;
    }

    showAlert('✨', 'الذكاء الاصطناعي', 'جاري التحليل...', 'انتظر');

    try {
        const response = await fetch(`http://localhost:5000/api/${mode}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                question: qData.q,
                answer: qData.answer
            })
        });

        const data = await response.json();

        const formattedResult = data.result
            .split('\n')
            .filter(p => p.trim() !== '')
            .map(p => `<p>${p}</p>`)
            .join('');

        showAlert(
            mode === "explain" ? '🧠' : '🔁',
            mode === "explain" ? 'الشرح الذكي' : 'سؤال مشابه',
            formattedResult,
            'ممتاز'
        );

    } catch (error) {
        showAlert('❌', 'خطأ', 'تعذر الاتصال بالسيرفر', 'حسناً');
    }
}


window.onload = initTest;
  const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
const body = document.body;

// وظيفة لتغيير الأيقونة
function updateIcon(isDark) {
    themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
}

// 1. التحقق من التفضيل المحفوظ سابقاً عند فتح الصفحة
if (localStorage.getItem('theme') === 'dark') {
    body.classList.replace('light-mode', 'dark-mode');
    updateIcon(true);
}

// 2. تفعيل التبديل عند الضغط على الزر
themeToggle.addEventListener('click', () => {
    if (body.classList.contains('light-mode')) {
        // التحويل لليلي
        body.classList.replace('light-mode', 'dark-mode');
        localStorage.setItem('theme', 'dark');
        updateIcon(true);
    } else {
        // التحويل لفاتح
        body.classList.replace('dark-mode', 'light-mode');
        localStorage.setItem('theme', 'light');
        updateIcon(false);
    }
});
