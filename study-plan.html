<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>أفق (UFUQ) | رفيق دربك الأكاديمي</title>


    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">


    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            navy: '#1a233a',
                            dark: '#0f172a',
                            yellow: '#ffce56',
                            offwhite: '#fcfcfc',
                            buttonBlue: '#2d3a54'
                        }
                    },
                    fontFamily: { tajawal: ['Tajawal', 'sans-serif'] }
                }
            }
        }
    </script>


    <style>
        body { font-family: 'Tajawal', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }
       
        /* تحسين مظهر الخلفية المنقوشة لتعمل في الوضعين */
        .pattern-overlay {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(#1a233a 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            opacity: 0.05;
            pointer-events: none;


        }
 body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: all 0.3s ease;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 30L60 30L30 60L0 30L30 0L30 30Z' fill='%23FFB800' fill-opacity='0.03'/%3E%3C/svg%3E");


        }
        .dark .pattern-overlay {
            background-image: radial-gradient(#ffffff 0.5px, transparent 0.5px);
            opacity: 0.03;
        }


        .nav-link { transition: color 0.3s ease; }
        .nav-link:hover { color: #ffce56; }


        .spinner { border: 3px solid rgba(255, 255, 255, 0.1); border-top-color: #ffce56; width: 20px; height: 20px; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>


<body id="bodyTag" class="bg-brand-offwhite dark:bg-brand-dark text-brand-navy dark:text-gray-200 min-h-screen">


 <nav class="bg-[#1B2436] text-white sticky top-0 z-50 shadow-2xl px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
             <div class="flex-shrink-0 flex items-center space-x-2 space-x-reverse">
                    <img class="h-12 w-auto rounded-full" src="logo.png" alt="UFUQ Logo">
                    <span class="text-3xl font-bold tracking-tight text-white/90">أفق (UFUQ)</span>
                </div>


           
            <div class="hidden lg:flex gap-8">
                <a href="index.html" class="nav-link  text-[#FFB800]">الرئيسية</a>
                <a href="tests.html" class="nav-link">الاختبارات</a>
                <a href="study-plan.html" class="nav-link">خطة المذاكرة</a>
                <a href="chat.html" class="nav-link">الدردشة الذكية  </a>


            </div>


            <div class="flex items-center gap-4">
                <button id="themeToggle" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 text-[#FFB800]">
                    <i id="themeIcon" class="fas fa-moon text-lg"></i>
                </button>
            </div>
        </div>
    </nav>




    <main class="max-w-7xl mx-auto px-6 py-12 relative">
       
        <div class="text-center mb-12">
            <h2 class="text-3xl md:text-5xl font-extrabold text-[#ffce56] mb-4">بوابة التدريب الكمي</h2>
            <p class="text-gray-500 dark:text-gray-400 text-lg">صمم خطتك الدراسية المخصصة باستخدام الذكاء الاصطناعي لتحقيق هدفك.</p>
        </div>


        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
           
            <div class="lg:col-span-4 lg:order-last">
                <div class="bg-white dark:bg-[#1a233a] p-8 rounded-[1.5rem] shadow-xl dark:shadow-2xl space-y-6 border border-gray-100 dark:border-white/5">
                    <div>
                        <label class="block text-xs text-gray-400 mb-2 font-bold uppercase tracking-wider">الدرجة الحالية</label>
                        <input id="currentScore" type="text" class="w-full bg-gray-50 dark:bg-[#0f172a] border-none p-4 rounded-xl text-brand-navy dark:text-white font-bold focus:ring-2 focus:ring-brand-yellow outline-none text-right" placeholder="مثلاً: 65" />
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-2 font-bold uppercase tracking-wider">الدرجة المستهدفة</label>
                        <input id="targetScore" type="text" class="w-full bg-gray-50 dark:bg-[#0f172a] border-none p-4 rounded-xl text-brand-navy dark:text-white font-bold focus:ring-2 focus:ring-brand-yellow outline-none text-right" placeholder="مثلاً: 95" />
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-2 font-bold uppercase tracking-wider">المدة (بالأسابيع)</label>
                        <input id="weeks" type="text" class="w-full bg-gray-50 dark:bg-[#0f172a] border-none p-4 rounded-xl text-brand-navy dark:text-white font-bold focus:ring-2 focus:ring-brand-yellow outline-none text-right" placeholder="مثلاً: 4" />
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-2 font-bold uppercase tracking-wider">نقاط الضعف</label>
                        <textarea id="weakness" rows="3" class="w-full bg-gray-50 dark:bg-[#0f172a] border-none p-4 rounded-xl text-brand-navy dark:text-white focus:ring-2 focus:ring-brand-yellow outline-none text-right resize-none text-sm" placeholder="مثال: الهندسة، الحساب السريع..."></textarea>
                    </div>


                    <button id="generateBtn" class="w-full bg-[#ffce56] hover:bg-[#ffd670] text-brand-navy font-black py-4 rounded-xl shadow-lg transition-all active:scale-95 flex justify-center items-center gap-2">
                        <span>توليد الخطة الذكية</span>
                        <i class="fas fa-bolt"></i>
                    </button>
                    <div id="loader-container" class="flex justify-center h-6"></div>
                </div>
            </div>


            <div class="lg:col-span-8">
                <div id="planCard" class="bg-white dark:bg-[#1a233a] rounded-[1.5rem] shadow-xl dark:shadow-2xl overflow-hidden min-h-[500px] flex flex-col border border-gray-100 dark:border-white/5">
                    <div class="p-6 border-b border-gray-100 dark:border-white/10 flex justify-between items-center bg-gray-50 dark:bg-[#1e2942]">
                         <h3 class="text-xl font-bold text-brand-navy dark:text-[#ffce56]">الخطة المقترحة</h3>
                        <span class="bg-brand-yellow/20 text-brand-navy dark:text-white px-3 py-1 rounded-full text-[10px] font-bold">نظام ذكي (AI)</span>
                    </div>
                   
                    <div class="p-8 flex-grow relative">
                        <div class="pattern-overlay"></div>
                       
                        <div id="outputContent" class="relative z-10 text-gray-600 dark:text-gray-300 space-y-6 text-right leading-relaxed">
                            <div class="flex flex-col items-center justify-center h-64 opacity-30">
                                <i class="fas fa-magic text-5xl mb-4"></i>
                                <p class="font-bold">أدخل بياناتك ليتم بناء خطتك الدراسية هنا</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>


        </div>
    </main>


    <script>
        // كود تبديل الوضع (Dark/Light Mode)
        const themeIcon = document.getElementById('themeIcon');
        const body = document.documentElement; // للتحكم في كلاس dark في وسم html


        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark');
           
            // تغيير الأيقونة
            if (body.classList.contains('dark')) {
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
        });


        // كود توليد الخطة
        const generateBtn = document.getElementById('generateBtn');
        const loader = document.getElementById('loader-container');
        const output = document.getElementById('outputContent');


        generateBtn.addEventListener('click', async () => {
            const currentScore = document.getElementById("currentScore").value;
            const targetScore = document.getElementById("targetScore").value;
            const weeks = document.getElementById("weeks").value;
            const weakness = document.getElementById("weakness").value;


            if (!weeks) {
                alert("أدخل عدد الأسابيع");
                return;
            }


            generateBtn.disabled = true;
            loader.innerHTML = '<div class="spinner"></div>';
            output.innerHTML = "";


            try {
                // ملاحظة: تأكد من أن السيرفر يعمل على هذا المسار
                const response = await fetch("https://q-ad1y.onrender.com/api/plan", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ currentScore, targetScore, weeks, weakness })
                });


                const data = await response.json();
                output.innerHTML = `
                    <div class="text-brand-navy dark:text-white whitespace-pre-wrap leading-relaxed font-medium">
                        ${data.plan}
                    </div>
                `;
            } catch (error) {
                output.innerHTML = `
                    <div class="text-center py-10 text-red-500">
                        <i class="fas fa-exclamation-triangle text-3xl mb-2"></i>
                        <p>⚠️ حدث خطأ في الاتصال بالسيرفر. تأكد من تشغيل الخلفية البرمجية.</p>
                    </div>
                `;
            }


            loader.innerHTML = '';
            generateBtn.disabled = false;
        });
    </script>
<script src="theme.js"></script>
</body>
</html>
